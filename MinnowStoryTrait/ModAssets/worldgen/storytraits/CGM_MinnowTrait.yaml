name: STRINGS.CODEX.STORY_TRAITS.CGM_MINNOWTRAIT.NAME
description: STRINGS.CODEX.STORY_TRAITS.CGM_MINNOWTRAIT.DESCRIPTION
icon: CGM_MinnowTrait_icon
colorHex: FFFFFF


additionalWorldTemplateRules:
        
# Minnow Reef spawn

  # Try finding a reef biome first (can exist from mixing)
  - names:
      - poi/imperative/CGM_minnowPOI_A
    listRule: TryOne
    priority: 500
    useRelaxedFiltering: true   
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [Reef]
  # try ocean biome
  - names:
      - poi/imperative/CGM_minnowPOI_A
    listRule: TryOne
    priority: 200
    useRelaxedFiltering: true   
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [Ocean]
  # Fallback
  - names:
      - poi/imperative/CGM_minnowPOI_A
    listRule: GuaranteeOne
    priority: 150
    useRelaxedFiltering: true
    allowedCellsFilter:
      - command: All
      - command: ExceptWith
        tagcommand: AtTag
        tag: NoGlobalFeatureSpawning # this also excludes Space
      - command: ExceptWith  # too close to start
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 0
        maxDistance: 2
        ignoreIfMissingTag: true
      - command: ExceptWith  # too far from start
        tagcommand: DistanceFromTag
        tag: AtStart
        minDistance: 5
        maxDistance: 99
        ignoreIfMissingTag: true 
      - command: ExceptWith # too close to surface
        tagcommand: DistanceFromTag
        tag: AtSurface
        minDistance: 0
        maxDistance: 1
      - command: ExceptWith
        temperatureRanges:
          - VeryHot
          - ExtremelyHot
          - ExtremelyCold
          - VeryVeryCold
      - command: ExceptWith
        zoneTypes: [OilField]


