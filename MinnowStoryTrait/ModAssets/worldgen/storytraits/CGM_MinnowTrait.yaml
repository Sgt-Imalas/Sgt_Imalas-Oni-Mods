# minnow abyss spawn

    # try abyss 
  - names:
    - dlc5::poi/imperative/minnowPOI_C_small
    listRule: TryOne
    priority: 500
    allowNearStart: true
    allowedCellsFilter:
      - command: Replace
        zoneTypes: [Abyss]
    # try oil biome
